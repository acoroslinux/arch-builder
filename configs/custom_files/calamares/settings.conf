# Calamares Main Settings
---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id:       fixmkinitcpio
    module:   shellprocess
    config:   shellprocess-fixmkinitcpio.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - removeuser
    - users
    - displaymanager
    - networkcfg
    - packages
    - hwclock
    - services-systemd
    - grubcfg
    - bootloader
    - shellprocess@fixmkinitcpio
    - umount
  - show:
    - finished

branding: default
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
