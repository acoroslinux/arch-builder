# shellprocess_clean_live.conf
# Calamares configuration to clean up live ISO files on the target installation
---
dontChroot: false
timeout: 30
script:
    - "rm -f /etc/skel/Desktop/install.desktop"
    - "bash -c 'for user_dir in /home/*; do rm -f "$user_dir/Desktop/install.desktop"; done'"
    - "rm -f /etc/sudoers.d/99-live-user"
