# Calamares Bootloader Module Config
---
# Define which bootloader you want to use for EFI installations.
efiBootLoader: "grub"

# Command to run grub-install
grubInstall: "grub-install"

# Command to run grub-probe
grubProbe: "grub-probe"

# Command to generate grub configuration (crucial for Arch Linux)
grubMkconfig: "grub-mkconfig"

# Target path for the generated GRUB config file
grubCfg: "/boot/grub/grub.cfg"

# Command to manage EFI boot manager variables
efiBootMgr: "efibootmgr"

# Name of the directory created in /boot/EFI for the bootloader files
efiBootLoaderId: "arch"

# Name of the entry that will appear in the UEFI BIOS boot menu
bootloaderEntryName: "arch-modern"

# Additional arguments to pass to grub-install for UEFI
# --removable is crucial for VirtualBox and portable EFI installs
grubInstallArgs: [ "--removable" ]

# Path to the kernel file inside the target system (relative to target /boot)
kernel: "/vmlinuz-linux"

# Path to the default initramfs image
img: "/initramfs-linux.img"

# Path to the fallback initramfs image
fallback: "/initramfs-linux-fallback.img"

# Timeout for the boot menu in seconds
timeout: "10"
