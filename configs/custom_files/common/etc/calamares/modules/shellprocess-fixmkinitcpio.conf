---
i18n:
    name: "Regenerating initramfs for installed kernels"

dontChroot: false
timeout: 600
script:
    # Step 1: Remove ALL archiso hook drop-ins (any that might exist)
    - "-rm -f /etc/mkinitcpio.conf.d/archiso.conf"
    - "-rm -f /etc/mkinitcpio.conf.d/archiso_loop_mnt.conf"
    - "-rm -f /etc/mkinitcpio.conf.d/archiso_pxe_nbd.conf"
    - "-rm -f /etc/mkinitcpio.conf.d/archiso_pxe_nfs.conf"
    - "-rm -f /etc/mkinitcpio.conf.d/archiso_pxe_http.conf"
    # Step 2: Write clean /etc/mkinitcpio.conf for a standard installed desktop
    #         (without any archiso hooks - those are only needed for the Live ISO)
    - "echo 'MODULES=()' > /etc/mkinitcpio.conf"
    - "echo 'BINARIES=()' >> /etc/mkinitcpio.conf"
    - "echo 'FILES=()' >> /etc/mkinitcpio.conf"
    - "echo 'HOOKS=(base udev autodetect microcode modconf kms keyboard keymap block filesystems fsck)' >> /etc/mkinitcpio.conf"
    # Step 3: Regenerate initramfs for ALL installed kernels
    - "mkinitcpio -P"
